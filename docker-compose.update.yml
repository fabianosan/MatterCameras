# Optional overlay — enables one-click updates from the Web UI.
#
#   docker compose -f docker-compose.yml -f docker-compose.update.yml up -d
#
# Mounts the git checkout and Docker socket so the app container can run
# scripts/self-update.sh (git pull, npm build, docker compose restart).
# Only use on trusted LANs; the Web UI has no authentication.

services:
  app:
    volumes:
      - .:/project:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MATTER_CAMERAS_SELF_UPDATE_ROOT=/project
