# Matter Cameras Bridge — pre-built images (GHCR). Single-file, standalone stack.
#
# Download THIS ONE file, set LAN_IP, deploy — in Portainer, CasaOS, or plain docker.
# No git clone, no host build, no seeded files: the app auto-creates its data in a
# named volume, and the go2rtc image ships its own config (LAN_IP fills the WebRTC
# candidates at startup).
#
#   plain docker:  LAN_IP=192.168.1.50 docker compose -f docker-compose.ghcr.yml up -d
#   Portainer/CasaOS: paste this file, set LAN_IP in the stack's environment variables.
#
# LAN_IP MUST be this machine's LAN IPv4 (e.g. 192.168.1.50), NOT 127.0.0.1 — Matter
# pairing and WebRTC live view depend on it. A wrong value starts cleanly but yields
# no video / no pairing. It is a required variable: deploy fails fast if unset.
#
# Requires Linux with host networking (Matter needs mDNS on UDP 5353 across the LAN).
# Docker Desktop on Windows/macOS does not provide host networking the same way.
#
# Optional overrides: REGISTRY, IMAGE_OWNER, GO2RTC_IMAGE, APP_IMAGE, IMAGE_TAG (image
# source — set IMAGE_OWNER to run a fork's images), TZ, WEB_PORT, MATTER_PORT, GITHUB_REPO.
#
# Host ports: 3202 Web UI · 3203 go2rtc API · 5550 Matter · 8554 RTSP · 8555 WebRTC · 5353 mDNS

services:
  go2rtc:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-patricktd}/${GO2RTC_IMAGE:-matter-go2rtc}:${IMAGE_TAG:-latest}
    container_name: matter_go2rtc
    restart: unless-stopped
    network_mode: host
    environment:
      # The one required value: this machine's LAN IPv4. Fills the WebRTC candidates
      # baked into the go2rtc image; deploy aborts with this message if unset.
      - LAN_IP=${LAN_IP:?Set LAN_IP to this machine's LAN IPv4 (e.g. 192.168.1.50), not 127.0.0.1}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3203/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-patricktd}/${APP_IMAGE:-mattercameras}:${IMAGE_TAG:-latest}
    container_name: matter_cameras
    restart: unless-stopped
    network_mode: host
    volumes:
      # Docker-managed named volume — config, cameras, matter-storage. No host path.
      - mattercam_data:/app/data
    environment:
      - NODE_ENV=production
      # matter.js log timestamps use the process timezone (Date.getHours(), not UTC).
      - TZ=${TZ:-America/Sao_Paulo}
      - MATTER_STORAGE_PATH=/app/data/matter-storage
      - MATTER_HOST=${LAN_IP:?Set LAN_IP to this machine's LAN IPv4 (e.g. 192.168.1.50), not 127.0.0.1}
      - MATTER_BIND_HOST=${MATTER_BIND_HOST:-${LAN_IP}}
      - MATTER_PORT=${MATTER_PORT:-5550}
      - WEB_PORT=${WEB_PORT:-3202}
      - GO2RTC_URL=${GO2RTC_URL:-http://127.0.0.1:3203}
      # Repo polled for update notifications (override to a fork via env).
      - GITHUB_REPO=${GITHUB_REPO:-patricktd/MatterCameras}
    depends_on:
      go2rtc:
        condition: service_healthy

volumes:
  mattercam_data:
