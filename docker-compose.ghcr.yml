# Matter Cameras Bridge — pre-built images (GHCR). Single-file stack for
# CasaOS / Portainer / plain docker. No clone, no host build, no seeded files:
# the app stores state in a named volume and the go2rtc config ships in the image.
#
# Set LAN_IP to this machine's LAN IPv4 (e.g. 192.168.1.50, NOT 127.0.0.1) so
# Matter pairing and WebRTC live view work:
#   - plain docker:  LAN_IP=192.168.1.50 docker compose -f docker-compose.ghcr.yml up -d
#   - CasaOS / Portainer: after importing, set LAN_IP in the container's Environment
#     variables. These UIs do NOT read a separate .env file, and do not expand
#     ${VAR:-default}, so the image tags below are concrete on purpose.
#
# To run your OWN fork's images, change the two `image:` lines from `patricktd`
# to your GitHub user (e.g. ghcr.io/yourname/...).
#
# Requires Linux with host networking (Matter mDNS on UDP 5353).
# Ports: 3202 Web UI · 3203 go2rtc · 5550 Matter · 8554 RTSP · 8555 WebRTC · 5353 mDNS

services:
  go2rtc:
    image: ghcr.io/patricktd/matter-go2rtc:latest
    container_name: matter_go2rtc
    restart: unless-stopped
    network_mode: host
    environment:
      # This machine's LAN IPv4. Fills the WebRTC candidates baked into the image.
      - LAN_IP=${LAN_IP:-192.168.1.50}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3203/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    image: ghcr.io/patricktd/mattercameras:latest
    container_name: matter_cameras
    restart: unless-stopped
    network_mode: host
    volumes:
      # Docker-managed named volume: config, cameras, matter-storage. No host path.
      - mattercam_data:/app/data
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-America/Sao_Paulo}
      - MATTER_STORAGE_PATH=/app/data/matter-storage
      # Same LAN IP as go2rtc above.
      - MATTER_HOST=${LAN_IP:-192.168.1.50}
      - WEB_PORT=${WEB_PORT:-3202}
      - GO2RTC_URL=http://127.0.0.1:3203
      - GITHUB_REPO=patricktd/MatterCameras
    depends_on:
      go2rtc:
        condition: service_healthy
    x-casaos:
      envs:
        - container: MATTER_HOST
          description:
            en_us: This machine's LAN IPv4 (e.g. 192.168.1.50), not 127.0.0.1.
      ports:
        - container: "3202"
          description:
            en_us: Web UI

volumes:
  mattercam_data:

x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  author: patricktd
  developer: patricktd
  category: Smart Home
  description:
    en_us: Bridge that exposes RTSP/ONVIF cameras as Matter 1.5 camera endpoints for Matter hubs.
  tagline:
    en_us: RTSP/ONVIF cameras as Matter 1.5 cameras.
  title:
    custom: Matter Cameras Bridge
  icon: https://images.seeklogo.com/logo-png/47/1/matter-icon-logo-png_seeklogo-477960.png
  scheme: http
  hostname: ""
  port_map: "3202"
  index: /
  is_uncontrolled: false
  store_app_id: mattercameras
